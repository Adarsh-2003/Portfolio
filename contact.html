<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Contact — Adarsh Gupta</title>
    <link rel="icon" type="image/png" href="assets/archive/favicon.png" />
    <link rel="apple-touch-icon" href="assets/archive/favicon.png" />
    <link rel="stylesheet" href="css/global.css" />
  </head>
  <body class="page page--contact">
    <a class="skip-link" href="#site-main">Skip to content</a>

    <header id="site-navbar" class="site-navbar" data-navbar aria-label="Site navigation"></header>

    <main id="site-main" class="site-main" aria-label="Main content">
      <section class="contact-section" aria-labelledby="contact-title">
        <div class="container contact-inner">
          <div class="contact-left">
            <p class="contact-eyebrow">GET IN TOUCH —</p>
            <h1 id="contact-title" class="contact-title">Let's Connect</h1>
            <p class="contact-lead">
              Have a project in mind, a question, or just want to say hello? I'd love to hear from you.
            </p>

            <div class="contact-info">
              <a class="contact-info-item" href="mailto:adarshgupta.contact@gmail.com">
                <span class="contact-info-icon" aria-hidden="true">
                  <i data-lucide="mail" class="icon-inline" aria-hidden="true"></i>
                </span>
                <span>
                  <span class="contact-info-label">Email</span>
                  <span class="contact-info-value">adarshgupta.contact@gmail.com</span>
                </span>
              </a>
              <div class="contact-info-item">
                <span class="contact-info-icon" aria-hidden="true">
                  <i data-lucide="map-pin" class="icon-inline" aria-hidden="true"></i>
                </span>
                <span>
                  <span class="contact-info-label">Location</span>
                  <span class="contact-info-value">Pune, India</span>
                </span>
              </div>
            </div>

            <div class="contact-socials" aria-label="Social links">
              <p class="contact-socials-label">Find me on</p>
              <div class="contact-socials-grid">
                <a class="contact-social-btn" href="https://github.com/adarsh-2003" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    width="24"
                    height="24"
                    fill="#60D5FA">

                </svg>
                  <span>GitHub</span>
                </a>
                <a class="contact-social-btn" href="https://www.linkedin.com/in/adarshgupta2003/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                  <svg xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 24 24"
                          width="24"
                          height="24"
                          fill="#60D5FA">
                          <path d="M20.447 20.452H16.89v-5.569c0-1.328-.027-3.037-1.85-3.037-1.852 0-2.135 1.445-2.135 2.939v5.667H9.35V9h3.414v1.561h.049c.476-.9 1.637-1.85 3.37-1.85 3.604 0 4.268 2.372 4.268 5.455v6.286zM5.337 7.433a2.063 2.063 0 1 1 0-4.126 2.063 2.063 0 0 1 0 4.126zM7.119 20.452H3.555V9h3.564v11.452z"/>
                      </svg>
                  <span>LinkedIn</span>
                </a>
                <a class="contact-social-btn" href="https://medium.com/@gupta-adarsh" target="_blank" rel="noopener noreferrer" aria-label="Medium">
                <svg xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    width="24"
                    height="24"
                    fill="#60D5FA">
                  <path d="M2 6.5l2.2 2.1v8.8L2 19.5V20h6v-.5l-2-2V9.7L12 20h.6l5.4-10.3v8.5l-1.8 1.8v.5H22v-.5l-1.5-1.4V7.4L22 6V5.5h-4.9l-4.2 8L8.3 5.5H2z"/>
                </svg>
                  <span>Medium</span>
                </a>
                <a class="contact-social-btn nsvg" href="https://twitter.com/adarshgupta_x" target="_blank" rel="noopener noreferrer" aria-label="Twitter">
                <svg xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  width="24"
                  height="24"
                  fill="#60D5FA">
                  <path d="M18.901 1.153H22.58l-8.03 9.18L24 22.847h-7.406l-5.8-7.584-6.64 7.584H.472l8.588-9.815L0 1.153h7.594l5.243 6.932L18.901 1.153zm-1.297 19.48h2.049L6.48 3.26H4.282l13.322 17.373z"/>
                </svg>
                  <span>Twitter</span>
                </a>
              </div>
            </div>
          </div>

          <div class="contact-right">
            <form
              class="contact-form"
              name="form-to-google-sheet"
              action="#"
              method="post"
              data-contact-form
              data-script-url="https://script.google.com/macros/s/AKfycbx8rCeQOBJM2dFxKd8-eVFhsS6vmLQHb82k0cDKBG7W7DPLJlRgpMeduUskNerYP8O4Dw/exec"
              aria-label="Contact form"
            >
              <div class="contact-field">
                <label class="contact-label" for="contact-name">Name</label>
                <input class="contact-input" id="contact-name" name="name" type="text" placeholder="Your name"
                  autocomplete="name" required />
              </div>

              <div class="contact-field">
                <label class="contact-label" for="contact-email">Email</label>
                <input class="contact-input" id="contact-email" name="email" type="email"
                  placeholder="you@example.com" autocomplete="email" required />
              </div>

              <div class="contact-field">
                <label class="contact-label" for="contact-subject">Subject</label>
                <input class="contact-input" id="contact-subject" name="subject" type="text"
                  placeholder="What's this about?" required />
              </div>

              <div class="contact-field">
                <label class="contact-label" for="contact-message">Message</label>
                <textarea class="contact-input contact-textarea" id="contact-message" name="message" rows="5"
                  placeholder="Tell me about your project or question..." required></textarea>
              </div>

              <div class="contact-form-status" data-form-status role="status" aria-live="polite" hidden></div>

              <button class="btn btn--primary contact-submit" type="submit">
                SEND
                <i data-lucide="arrow-right" class="btn-icon" aria-hidden="true"></i>
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer id="site-footer" class="site-footer" data-footer aria-label="Site footer"></footer>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/icons.js" defer></script>
    <script src="js/navbar.js" defer></script>
    <script src="js/animations.js" defer></script>
    <script src="js/contact.js" defer></script>
    <script src="js/social-links.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
